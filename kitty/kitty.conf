shell fish

background_opacity 1
allow_remote_control yes
dynamic_background_opacity yes
copy_on_select yes
clipboard_control write-clipboard write-primary

font_size	 12
# font_family      Patrick Hand
# bold_font        IosevkaNF-Bold
# italic_font      IosevkaNF-MediumItalic
# bold_italic_font IosevkaNF-BoldItalic
# modify_font cell_height 90%

remember_window_size  yes
initial_window_width  1000
initial_window_height 500
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
scrollback_lines 10000
enable_audio_bell no

window_padding_width 10

hide_window_decorations yes

confirm_os_window_close 0

cursor_trail 1

map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter 3
# reset all windows in the tab to default sizes
map ctrl+home resize_window reset

# include ~/.cache/ambxst/kitty.conf


# BEGIN_KITTY_FONTS
font_family      family="Iosevka Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Matugen
include current-theme.conf
# END_KITTY_THEME